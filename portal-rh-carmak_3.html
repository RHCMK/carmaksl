<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal RH Carmak</title>

  <style>
    :root {
      --verde-escuro:  #0a2212;
      --verde-medio:   #0d3019;
      --verde-card:    rgba(10, 34, 18, 0.90);
      --verde-limao:   #5cb800;
      --verde-borda:   rgba(92, 184, 0, 0.30);
      --verde-glow:    rgba(92, 184, 0, 0.15);
      --text-main:     #f0f7ec;
      --text-muted:    #8aab7a;
      --shadow:        0 24px 80px rgba(0,0,0,0.55);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(ellipse at top left,  rgba(92,184,0,0.18) 0%, transparent 45%),
        radial-gradient(ellipse at bottom right, rgba(13,48,25,0.9) 0%, transparent 60%),
        var(--verde-escuro);
    }

    /* ── PAGE ── */
    .page {
      min-height: 100vh;
      padding: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CARDS ── */
    .login-card, .portal-card {
      width: 100%;
      background: var(--verde-card);
      backdrop-filter: blur(24px);
      border: 1px solid var(--verde-borda);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .login-card {
      max-width: 460px;
      padding: 40px 36px;
      animation: fadeIn .5s ease;
    }

    .portal-card { max-width: 1160px; }

    /* ── LOGIN BRAND ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--verde-borda);
    }

    .brand img {
      height: 52px;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(92,184,0,0.4));
    }

    .brand-sub {
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── TITLES ── */
    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 28px;
    }

    /* ── FIELDS ── */
    .field { margin-bottom: 16px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 14px;
      border: 1px solid var(--verde-borda);
      background: rgba(255,255,255,0.05);
      color: var(--text-main);
      outline: none;
      font-size: 15px;
      transition: .2s ease;
    }

    input::placeholder { color: #3d6040; }

    input:focus {
      border-color: rgba(92,184,0,.7);
      box-shadow: 0 0 0 4px rgba(92,184,0,.12);
    }

    /* ── BUTTON ── */
    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #5cb800, #3a7a00);
      box-shadow: 0 12px 30px rgba(92,184,0,.28);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(92,184,0,.38);
    }

    /* ── ERRO ── */
    .erro {
      min-height: 20px;
      margin-top: 14px;
      color: #fca5a5;
      text-align: center;
      font-size: 14px;
    }

    .hint {
      margin-top: 20px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(92,184,0,.07);
      border: 1px solid var(--verde-borda);
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }

    /* ── PORTAL HEADER ── */
    #areaCliente { display: none; width: 100%; animation: fadeIn .5s ease; }

    .portal-header {
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      border-bottom: 1px solid var(--verde-borda);
      background: rgba(0,0,0,.18);
    }

    .header-left { display: flex; align-items: center; gap: 20px; }

    .portal-logo {
      height: 36px;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(92,184,0,.35));
    }

    .header-divider {
      width: 1px;
      height: 32px;
      background: var(--verde-borda);
    }

    .portal-title h2 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .portal-title p {
      margin-top: 3px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .logout-btn {
      border: 1px solid rgba(239,68,68,.3);
      background: rgba(239,68,68,.10);
      color: #fecaca;
      padding: 10px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      transition: .2s ease;
    }

    .logout-btn:hover { background: rgba(239,68,68,.2); }

    /* ── PORTAL BODY ── */
    .portal-body { padding: 28px 32px; }

    .section-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .section-label h3 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: var(--verde-limao);
    }

    .section-label span { color: var(--text-muted); font-size: 13px; }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: .5; }

    .empty-state h4 {
      font-size: 17px;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── DASHBOARD GRID ── */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .dashboard-card {
      position: relative;
      min-height: 136px;
      padding: 18px;
      border-radius: 20px;
      border: 1px solid var(--verde-borda);
      background: linear-gradient(135deg, rgba(92,184,0,.09), rgba(10,34,18,.6));
      cursor: pointer;
      overflow: hidden;
      transition: .22s ease;
    }

    .dashboard-card:hover {
      transform: translateY(-4px);
      border-color: rgba(92,184,0,.55);
      box-shadow: 0 16px 40px rgba(0,0,0,.3);
    }

    .dashboard-card.active {
      border-color: var(--verde-limao);
      box-shadow: 0 0 0 3px rgba(92,184,0,.2);
    }

    .dashboard-card::after {
      content: "";
      position: absolute;
      width: 110px; height: 110px;
      right: -30px; bottom: -30px;
      border-radius: 999px;
      background: rgba(92,184,0,.10);
    }

    .dashboard-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(92,184,0,.16);
      font-size: 19px;
      margin-bottom: 14px;
    }

    .dashboard-card h4 { font-size: 16px; margin-bottom: 6px; }

    .dashboard-card p {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.45;
      max-width: 88%;
    }

    /* ── VIEWER ── */
    .viewer {
      display: none;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--verde-borda);
      background: rgba(0,0,0,.15);
      animation: fadeIn .4s ease;
    }

    .viewer-top {
      padding: 13px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--verde-borda);
    }

    .viewer-top strong { font-size: 14px; }

    .open-new {
      color: var(--verde-limao);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }

    iframe {
      width: 100%;
      height: 820px;
      border: none;
      display: block;
      background: white;
    }

    /* ── BADGE ── */
    .badge-rh {
      display: inline-block;
      background: linear-gradient(135deg, #5cb800, #3a7a00);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 999px;
      margin-left: 10px;
      vertical-align: middle;
      letter-spacing: .05em;
    }

    /* ── ANIM ── */
    /* ── FAVORITO ── */
    .fav-btn {
      position: absolute;
      top: 12px; right: 12px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      z-index: 2;
      opacity: 0.35;
      transition: opacity .2s ease, transform .2s ease;
      line-height: 1;
    }
    .fav-btn:hover { opacity: 0.8; transform: scale(1.2); }
    .fav-btn.ativo { opacity: 1; filter: drop-shadow(0 0 6px rgba(255,200,0,.7)); }

    /* ── BADGE NOVO ── */
    .badge-novo {
      display: inline-block;
      background: linear-gradient(135deg, #5cb800, #3a7a00);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: .05em;
      margin-left: 8px;
      vertical-align: middle;
      animation: pulseNovo 2s infinite;
    }

    @keyframes pulseNovo {
      0%, 100% { box-shadow: 0 0 0 0 rgba(92,184,0,.5); }
      50%       { box-shadow: 0 0 0 5px rgba(92,184,0,0); }
    }

    /* ── SEÇÃO FAVORITOS ── */
    .section-favs {
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--verde-borda);
    }

    .section-favs-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── PAINEL RH ── */
    .rh-panel {
      display: none;
      margin-bottom: 28px;
      border-radius: 20px;
      border: 1px solid rgba(92,184,0,.4);
      background: linear-gradient(135deg, rgba(92,184,0,.06), rgba(10,34,18,.7));
      overflow: hidden;
    }

    .rh-panel-header {
      padding: 18px 24px;
      border-bottom: 1px solid rgba(92,184,0,.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .rh-panel-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--verde-limao);
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
    }

    .rh-status {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rh-status .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--verde-limao);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }

    .rh-panel-body { padding: 20px 24px; }

    .rh-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .rh-kpi {
      background: rgba(0,0,0,.25);
      border: 1px solid var(--verde-borda);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      transition: .2s ease;
    }

    .rh-kpi:hover {
      border-color: rgba(92,184,0,.5);
      transform: translateY(-2px);
    }

    .rh-kpi .kpi-icon { font-size: 20px; margin-bottom: 8px; }

    .rh-kpi .kpi-valor {
      font-size: 30px;
      font-weight: 800;
      color: var(--verde-limao);
      line-height: 1;
      margin-bottom: 6px;
    }

    .rh-kpi .kpi-label {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .rh-kpi.loading .kpi-valor {
      font-size: 16px;
      color: var(--text-muted);
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }

    /* ── GRÁFICO RH ── */
    .rh-chart-wrap {
      background: rgba(0,0,0,.2);
      border: 1px solid var(--verde-borda);
      border-radius: 16px;
      padding: 20px;
    }

    .rh-chart-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .rh-chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 120px;
    }

    .rh-bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      height: 100%;
      justify-content: flex-end;
    }

    .rh-bar {
      width: 100%;
      border-radius: 6px 6px 0 0;
      transition: height .6s ease;
      min-height: 4px;
      position: relative;
    }

    .rh-bar.ativos   { background: linear-gradient(180deg, #5cb800, #3a7a00); }
    .rh-bar.admitidos { background: linear-gradient(180deg, #38bdf8, #0284c7); }
    .rh-bar.demitidos { background: linear-gradient(180deg, #fca5a5, #ef4444); }

    .rh-bar-label {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .rh-bar-val {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-main);
    }

    .rh-chart-legend {
      display: flex;
      gap: 16px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .rh-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .rh-legend-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
    }

    .rh-atualizado {
      margin-top: 14px;
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 700px) {
      .page { padding: 16px; align-items: flex-start; }
      .login-card { margin-top: 32px; padding: 28px 22px; }
      .portal-header { flex-direction: column; align-items: stretch; }
      .header-left { flex-wrap: wrap; }
      .logout-btn { width: 100%; text-align: center; }
      iframe { height: 680px; }
    }
  </style>
</head>

  function carregarFavs(login) {
    try {
      const raw = localStorage.getItem("favs_" + login);
      return raw ? new Set(JSON.parse(raw)) : new Set();
    } catch { return new Set(); }
  }

  function salvarFavs(login, set) {
    try { localStorage.setItem("favs_" + login, JSON.stringify([...set])); } catch {}
  }

  function isNovo(titulo) {
    const data = DATA_ADICAO[titulo];
    if (!data) return false;
    const diff = (Date.now() - new Date(data).getTime()) / (1000*60*60*24);
    return diff <= 7;
  }

  function normalizar(t) {
    return t.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"");
  }

  function entrar() {
    const login  = normalizar(document.getElementById("login").value);
    const senha  = document.getElementById("senha").value.trim();
    const erro   = document.getElementById("erro");
    erro.innerText = "";

    const usuario = usuarios[login];
    if (!usuario || usuario.senha !== senha) {
      erro.innerText = "Login ou senha incorretos.";
      return;
    }

    usuarioAtual = usuario;
    document.getElementById("areaLogin").style.display   = "none";
    document.getElementById("areaCliente").style.display = "block";

    const badge = usuario.isRH ? '<span class="badge-rh">RH</span>' : "";
    document.getElementById("tituloCliente").innerHTML = "Olá, " + usuario.nome + badge;

    const total = usuario.dashboards.length;
    document.getElementById("contadorDashboards").innerText =
      total > 0 ? total + " item(s) disponível(is)" : "";
    document.getElementById("subtituloPortal").innerText =
      total > 0 ? "Selecione um item abaixo para visualizar."
                : "Seus painéis serão disponibilizados em breve.";

    favoritosAtual = carregarFavs(login);

    montarDashboards(usuario);

  function criarCard(d, index, origem) {
    const card = document.createElement("div");
    card.className = "dashboard-card";
    card.style.paddingTop = "14px";

    const isFav = favoritosAtual.has(d.titulo);
    const novo  = isNovo(d.titulo);

    card.innerHTML = `
      <button class="fav-btn ${isFav ? "ativo" : ""}" title="${isFav ? "Remover dos favoritos" : "Adicionar aos favoritos"}">⭐</button>
      <div class="dashboard-icon">${d.icone || "📊"}</div>
      <h4>${d.titulo}${novo ? '<span class="badge-novo">NOVO</span>' : ""}</h4>
      <p>${d.descricao || "Clique para abrir."}</p>
      ${d.novaAba ? '<span style="font-size:11px;color:#5cb800;margin-top:8px;display:block;">↗ Abre em nova aba</span>' : ""}`;

    // clique no card (exceto no botão fav)
    card.addEventListener("click", (e) => {
      if (e.target.closest(".fav-btn")) return;
      abrirDashboard(index, card, origem);
    });

    // clique no favorito
    card.querySelector(".fav-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      toggleFav(d.titulo);
    });

    return card;
  }

  function montarDashboards(usuario) {
    const lista    = document.getElementById("listaDashboards");
    const listaFav = document.getElementById("listaFavs");
    const secaoFav = document.getElementById("secaoFavs");

    lista.innerHTML    = "";
    listaFav.innerHTML = "";

      lista.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <h4>Nenhum painel configurado ainda</h4>
          <p>Os dashboards e formulários da sua equipe<br>serão adicionados em breve pelo RH.</p>
        </div>`;
      secaoFav.style.display = "none";
      return;
    }

    const favs = [...favoritosAtual];
    const temFavs = favs.some(t => usuario.dashboards.find(d => d.titulo === t));
    secaoFav.style.display = temFavs ? "block" : "none";

    usuario.dashboards.forEach((d, i) => {
      // card principal
      lista.appendChild(criarCard(d, i, "lista"));

      // card favorito (cópia)
      if (favoritosAtual.has(d.titulo)) {
        listaFav.appendChild(criarCard(d, i, "fav"));
      }
    });
  }

  function toggleFav(titulo) {
    const login = Object.keys(usuarios).find(k => usuarios[k] === usuarioAtual);
    if (favoritosAtual.has(titulo)) {
      favoritosAtual.delete(titulo);

    montarDashboards(usuarioAtual);

  // ── LINK DA PLANILHA QUADRO DE LOTAÇÃO ──
  const SHEET_LOTACAO = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTuJnYDkeaeNR-jfJbKR1DwNDyXrfM6mrFUtvPA76518KFA1g0DA0MXcr-fX0FbeANUB7yJ1wfSmbg4/pub?gid=1565595325&single=true&output=csv";

  async function montarPainelRH() {
    const totalGestores = Object.keys(usuarios).filter(k => !usuarios[k].isRH).length;
    const kpisEl   = document.getElementById("rhKpis");
    const statusEl = document.getElementById("rhStatus");
    const chartEl  = document.getElementById("rhChartBars");

    // KPI gestores (imediato)
    kpisEl.innerHTML = `
      <div class="rh-kpi">
        <div class="kpi-icon">👥</div>
        <div class="kpi-valor">${totalGestores}</div>
        <div class="kpi-label">Gestores<br>Ativos</div>
      </div>
      <div class="rh-kpi loading" id="kpiAtivos">
        <div class="kpi-icon">🏢</div>
        <div class="kpi-valor">...</div>
        <div class="kpi-label">Colaboradores<br>Ativos</div>
      </div>
      <div class="rh-kpi loading" id="kpiAdmitidos">
        <div class="kpi-icon">✅</div>
        <div class="kpi-valor">...</div>
        <div class="kpi-label">Admitidos<br>no Mês</div>
      </div>
      <div class="rh-kpi loading" id="kpiDemitidos">
        <div class="kpi-icon">🔄</div>
        <div class="kpi-valor">...</div>
        <div class="kpi-label">Demitidos<br>no Mês</div>
      </div>
      <div class="rh-kpi loading" id="kpiFerias">
        <div class="kpi-icon">🏖️</div>
        <div class="kpi-valor">...</div>
        <div class="kpi-label">Em<br>Férias</div>
      </div>`;

    // Buscar planilha
    try {
      const res  = await fetch(SHEET_LOTACAO);
      const text = await res.text();
      const rows = text.trim().split("\n").map(r => r.split(",").map(c => c.replace(/^"|"$/g,"").trim()));

      // Encontrar linha de cabeçalho com meses
      const headerRow = rows[0];
      const meses = ["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];

      // Achar último mês com dado
      let lastColIdx = -1;
      let lastMes = "";
      for (let i = headerRow.length - 1; i >= 1; i--) {
        const h = headerRow[i].toUpperCase().trim();
        if (meses.some(m => h.includes(m))) {
          // Checar se alguma row tem valor nessa coluna
          const temDado = rows.slice(1).some(r => r[i] && r[i].trim() !== "" && !isNaN(r[i].replace(/\./g,"").replace(",",".")));
          if (temDado) { lastColIdx = i; lastMes = headerRow[i]; break; }
        }
      }

      // Helper: achar linha por keyword
      function findRow(keyword) {
        return rows.find(r => r[0] && r[0].toUpperCase().includes(keyword.toUpperCase()));
      }

      function getVal(row, col) {
        if (!row || col < 0) return "—";
        const v = row[col];
        return (v && v.trim() !== "") ? parseInt(v) || v : "—";
      }

      const rowAtivos    = findRow("COLAB ATIVOS");
      const rowAdmitidos = findRow("ADMITIDOS");
      const rowDemitidos = findRow("DEMITIDOS");
      const rowFerias    = findRow("FÉRIAS") || findRow("FERIAS");

      const vAtivos    = getVal(rowAtivos,    lastColIdx);
      const vAdmitidos = getVal(rowAdmitidos, lastColIdx);
      const vDemitidos = getVal(rowDemitidos, lastColIdx);
      const vFerias    = getVal(rowFerias,    lastColIdx);

      // Atualizar KPIs
      function setKpi(id, val) {
        const el = document.getElementById(id);
        if (el) {
          el.classList.remove("loading");
          el.querySelector(".kpi-valor").innerText = val;
        }
      }
      setKpi("kpiAtivos",    vAtivos);
      setKpi("kpiAdmitidos", vAdmitidos);
      setKpi("kpiDemitidos", vDemitidos);
      setKpi("kpiFerias",    vFerias);

      // ── GRÁFICO: últimos 6 meses ──
      // Coletar colunas dos últimos 6 meses com dados
      const colsCandidatas = [];
      for (let i = 1; i < headerRow.length; i++) {
        const h = headerRow[i].toUpperCase().trim();
        if (meses.some(m => h.includes(m))) {
          const temDado = rows.slice(1).some(r => r[i] && r[i].trim() !== "" && !isNaN(r[i]));
          if (temDado) colsCandidatas.push({ col: i, label: headerRow[i] });
        }
      }
      const ultimas6 = colsCandidatas.slice(-6);

      const maxAtivos = Math.max(...ultimas6.map(c => parseInt(getVal(rowAtivos, c.col)) || 0));

      chartEl.innerHTML = "";
      ultimas6.forEach(c => {
        const a = parseInt(getVal(rowAtivos,    c.col)) || 0;
        const ad = parseInt(getVal(rowAdmitidos, c.col)) || 0;
        const d  = parseInt(getVal(rowDemitidos, c.col)) || 0;
        const maxVal = Math.max(a, 1);
        const pct = v => Math.max(4, Math.round((v / maxAtivos) * 100));

        const group = document.createElement("div");
        group.className = "rh-bar-group";
        group.innerHTML = `
          <div class="rh-bar-val">${a}</div>
          <div style="width:100%;display:flex;gap:2px;align-items:flex-end;height:90px;">
            <div class="rh-bar ativos"    style="height:${pct(a)}%;flex:3" title="Ativos: ${a}"></div>
            <div class="rh-bar admitidos" style="height:${pct(ad)}%;flex:2" title="Admitidos: ${ad}"></div>
            <div class="rh-bar demitidos" style="height:${pct(d)}%;flex:2" title="Demitidos: ${d}"></div>
          </div>
          <div class="rh-bar-label">${c.label}</div>`;
        chartEl.appendChild(group);
      });

      statusEl.innerHTML = '<span class="dot"></span><span>Atualizado em tempo real</span>';
      document.getElementById("rhAtualizado").innerText =
        "Fonte: Quadro de Lotação • Mês atual: " + lastMes;

    } catch(e) {
      statusEl.innerHTML = '<span style="color:#fca5a5">⚠ Erro ao carregar planilha</span>';
      ["kpiAtivos","kpiAdmitidos","kpiDemitidos","kpiFerias"].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.classList.remove("loading"); el.querySelector(".kpi-valor").innerText = "—"; }
      });
      document.getElementById("rhAtualizado").innerText = "Não foi possível conectar à planilha.";
    }
  }

  function abrirDashboard(index, card, origem) {
    const d = usuarioAtual.dashboards[index];

    if (d.novaAba) {
      window.open(d.link, "_blank");
      return;
    }

    document.querySelectorAll(".dashboard-card").forEach(c => c.classList.remove("active"));
    card.classList.add("active");
    document.getElementById("viewer").style.display   = "block";
    document.getElementById("viewerTitulo").innerText = d.titulo;
    document.getElementById("abrirNovaAba").href      = d.link;
    document.getElementById("iframePowerBI").src      = d.link;
    document.getElementById("viewer").scrollIntoView({ behavior:"smooth", block:"start" });
  }

  function sair() {
    usuarioAtual    = null;
    favoritosAtual  = {};
    ["login","senha"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("erro").innerText              = "";
    document.getElementById("listaDashboards").innerHTML   = "";
    document.getElementById("listaFavs").innerHTML         = "";
    document.getElementById("secaoFavs").style.display    = "none";
    document.getElementById("iframePowerBI").src           = "";
    document.getElementById("viewer").style.display        = "none";
    document.getElementById("areaCliente").style.display   = "none";
    document.getElementById("areaLogin").style.display     = "block";
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Enter" && document.getElementById("areaLogin").style.display !== "none") entrar();
  });
</script>
